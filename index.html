<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Win</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🏆 Daily Win</h1>

        <p class="subtitle">
            Write one thing you achieved today.
        </p>

        <div id="streak" class="streak">🔥 Streak: 0 days</div>

        <button id="themeBtn" class="theme-btn">🌙 Dark Mode</button>

        <div class="input-group">
            <input id="winInput" type="text" placeholder="e.g. Finished homework">
            <button id="addBtn">Add</button>
        </div>

        <ul id="winList"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
